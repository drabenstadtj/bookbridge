<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BookBridge</title>
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0f1117;
                --surface: #1a1d27;
                --border: #2a2d3a;
                --text: #e2e0d9;
                --muted: #6b7080;
                --accent: #4a9eff;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: system-ui, sans-serif;
                font-size: 14px;
                line-height: 1.5;
            }

            header {
                position: sticky;
                top: 0;
                z-index: 100;
                padding: 0 2rem;
                background: var(--bg);
                border-bottom: 1px solid var(--border);
            }
            .header-inner {
                max-width: 1200px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 2rem;
                height: 56px;
            }
            .logo {
                font-weight: 600;
                white-space: nowrap;
                color: var(--text);
            }

            .search-wrap {
                flex: 1;
                display: flex;
                gap: 0.5rem;
                align-items: center;
            }
            .search-input, .format-select {
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: 4px;
                padding: 0.45rem 0.75rem;
                font-size: 13px;
                outline: none;
            }
            .search-input { flex: 1; }
            .search-input:focus, .format-select:focus {
                border-color: var(--accent);
            }
            .format-select { cursor: pointer; }
            .btn {
                padding: 0.45rem 1rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 4px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                white-space: nowrap;
            }
            .btn:hover { opacity: 0.85; }

            main {
                max-width: 1200px;
                margin: 0 auto;
                padding: 2rem;
            }

            .state-msg {
                text-align: center;
                padding: 4rem 2rem;
                color: var(--muted);
            }

            #results-count {
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 1rem;
            }

            .results-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 0.75rem;
            }

            .book-card {
                padding: 1rem;
                display: flex;
                gap: 0.85rem;
                align-items: stretch;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
            }
            .book-card:hover { border-color: #3a3d4a; }

            .book-cover {
                width: 72px;
                min-height: 109px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                border-radius: 3px;
                background: var(--bg);
                border: 1px solid var(--border);
                font-size: 1.2rem;
            }
            .book-cover img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .book-info {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
            }
            .book-meta-wrap {
                flex: 1;
            }
            .book-title {
                font-weight: 500;
                margin-bottom: 0.2rem;
                overflow: hidden;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
            }
            .book-title a {
                color: inherit;
                text-decoration: none;
            }
            .book-title a:hover { text-decoration: underline; }
            .book-author {
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 0.5rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .book-meta {
                display: flex;
                flex-wrap: wrap;
                gap: 0.3rem;
                margin-bottom: 0.6rem;
            }
            .tag {
                font-size: 11px;
                padding: 0.15rem 0.4rem;
                border-radius: 3px;
                background: var(--bg);
                border: 1px solid var(--border);
                color: var(--muted);
                text-transform: uppercase;
            }

            .btn-download {
                width: 100%;
                padding: 0.4rem;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--muted);
                font-size: 12px;
                cursor: pointer;
            }
            .btn-download:hover { border-color: var(--accent); color: var(--accent); }
            .btn-download:disabled { opacity: 0.5; cursor: default; }

            #jobs-panel {
                position: fixed;
                bottom: 1.5rem;
                right: 1.5rem;
                width: 320px;
                max-height: 380px;
                overflow: hidden;
                display: none;
                flex-direction: column;
                z-index: 200;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
            }
            #jobs-panel.visible { display: flex; }

            .jobs-header {
                padding: 0.6rem 0.85rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid var(--border);
                font-size: 12px;
                color: var(--muted);
            }
            .jobs-header button {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-size: 14px;
                line-height: 1;
            }
            .jobs-header button:hover { color: var(--text); }

            .jobs-list {
                overflow-y: auto;
                padding: 0.5rem;
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
            }
            .job-item {
                padding: 0.5rem 0.7rem;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 4px;
            }
            .job-title {
                font-size: 12px;
                font-weight: 500;
                margin-bottom: 0.2rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .job-status {
                font-size: 11px;
                color: var(--muted);
            }

            .progress-bar {
                height: 2px;
                background: var(--border);
                border-radius: 1px;
                margin-top: 0.35rem;
                overflow: hidden;
            }
            .progress-fill {
                height: 100%;
                background: var(--accent);
            }

            #jobs-btn {
                position: fixed;
                bottom: 1.5rem;
                right: 1.5rem;
                padding: 0.5rem 1rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 4px;
                font-size: 12px;
                font-weight: 500;
                cursor: pointer;
                z-index: 199;
                display: none;
            }
            #jobs-btn:hover { opacity: 0.85; }
            #jobs-btn.visible { display: block; }

        </style>
    </head>
    <body>
        <header>
            <div class="header-inner">
                <div class="search-wrap">
                    <input
                        class="search-input"
                        id="q"
                        type="text"
                        placeholder="Search title or author…"
                        autocomplete="off"
                    />
                    <select class="format-select" id="fmt">
                        <option value="">Any format</option>
                        <option value="epub">EPUB</option>
                        <option value="pdf">PDF</option>
                        <option value="mobi">MOBI</option>
                        <option value="azw3">AZW3</option>
                        <option value="fb2">FB2</option>
                    </select>
                    <button class="btn" id="search-btn">Search</button>
                </div>
            </div>
        </header>

        <main>
            <div id="state-area">
                <div class="state-msg">
                    Search for a book to download it straight into your Calibre
                    library.
                </div>
            </div>
            <div id="results-count" style="display: none"></div>
            <div id="results-grid" class="results-grid"></div>
        </main>

        <button id="jobs-btn">Downloads <span id="jobs-count">0</span></button>

        <div id="jobs-panel">
            <div class="jobs-header">
                Active Downloads
                <button id="close-jobs">✕</button>
            </div>
            <div class="jobs-list" id="jobs-list"></div>
        </div>

        <script>
            const state = {
                jobs: {}, // job_id -> {md5, title, ...}
                polling: null,
            };

            // ── Search ───────────────────────────────────────────────────────────────
            document
                .getElementById("search-btn")
                .addEventListener("click", doSearch);
            document.getElementById("q").addEventListener("keydown", (e) => {
                if (e.key === "Enter") doSearch();
            });

            async function doSearch() {
                const q = document.getElementById("q").value.trim();
                const fmt = document.getElementById("fmt").value;
                if (!q) return;

                showSkeleton();

                try {
                    const res = await fetch(
                        `/api/search?q=${encodeURIComponent(q)}&format=${fmt}`,
                    );
                    const data = await res.json();
                    renderResults(data.results || []);
                } catch (e) {
                    showState("Search failed — is the server running?");
                }
            }

            function showSkeleton() {
                showState("Searching…");
            }

            function showState(msg) {
                document.getElementById("state-area").innerHTML =
                    `<div class="state-msg">${msg}</div>`;
                document.getElementById("results-grid").innerHTML = "";
                document.getElementById("results-count").style.display = "none";
            }

            function renderResults(results) {
                document.getElementById("state-area").innerHTML = "";
                const grid = document.getElementById("results-grid");
                const count = document.getElementById("results-count");

                if (!results.length) {
                    showState(
                        "No results found. Try different keywords or format.",
                    );
                    return;
                }

                count.style.display = "block";
                count.textContent = `${results.length} result${results.length !== 1 ? "s" : ""} found`;

                grid.innerHTML = results
                    .map((book) => {
                        const coverHtml = book.cover
                            ? `<img src="${escHtml(book.cover)}" alt="" loading="lazy" onerror="this.parentElement.textContent='${book.icon}'">`
                            : book.icon;

                        const tags = [
                            book.format
                                ? `<span class="tag">${book.format}</span>`
                                : "",
                            book.size
                                ? `<span class="tag">${escHtml(book.size)}</span>`
                                : "",
                            book.year
                                ? `<span class="tag">${book.year}</span>`
                                : "",
                            book.language
                                ? `<span class="tag">${escHtml(book.language)}</span>`
                                : "",
                        ]
                            .filter(Boolean)
                            .join("");

                        return `
                        <div class="book-card" data-md5="${book.md5}">
                            <div class="book-cover">${coverHtml}</div>
                            <div class="book-info">
                                <div class="book-meta-wrap">
                                    <div class="book-title"><a href="https://annas-archive.gl/md5/${book.md5}" target="_blank" rel="noopener">${escHtml(book.title)}</a></div>
                                    <div class="book-author">${escHtml(book.author)}</div>
                                    <div class="book-meta">${tags}</div>
                                </div>
                                <button class="btn-download" data-md5="${book.md5}" data-title="${escHtml(book.title)}"
                                        onclick="startDownload(this)">
                                    send to calibre
                                </button>
                            </div>
                        </div>`;
                    })
                    .join("");
            }

            // ── Download ─────────────────────────────────────────────────────────────
            async function startDownload(btn) {
                const md5 = btn.dataset.md5;
                const title = btn.dataset.title;
                btn.disabled = true;
                btn.textContent = "queuing…";

                try {
                    const res = await fetch("/api/download", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ md5 }),
                    });
                    const data = await res.json();
                    if (data.job_id) {
                        state.jobs[data.job_id] = { md5, title, btn };
                        startPolling();
                        showJobsBtn();
                    } else {
                        btn.disabled = false;
                        btn.textContent = "failed to queue";
                    }
                } catch (e) {
                    btn.disabled = false;
                    btn.textContent = "error";
                }
            }

            function startPolling() {
                if (state.polling) return;
                state.polling = setInterval(pollJobs, 1500);
            }

            async function pollJobs() {
                const ids = Object.keys(state.jobs);
                if (!ids.length) {
                    clearInterval(state.polling);
                    state.polling = null;
                    return;
                }

                for (const job_id of ids) {
                    try {
                        const res = await fetch(`/api/status/${job_id}`);
                        const job = await res.json();
                        const entry = state.jobs[job_id];

                        if (entry.btn) {
                            entry.btn.textContent = job.status;
                            entry.btn.disabled = job.done;
                        }

                        entry.status = job.status;
                        entry.progress = job.progress || 0;
                        entry.done = job.done;

                        if (job.done) {
                            setTimeout(() => {
                                delete state.jobs[job_id];
                                updateJobsPanel();
                            }, 8000);
                        }
                    } catch (e) {
                        /* ignore */
                    }
                }
                updateJobsPanel();
            }

            // ── Jobs panel ───────────────────────────────────────────────────────────
            function showJobsBtn() {
                document.getElementById("jobs-btn").classList.add("visible");
                updateJobsCount();
            }

            function updateJobsCount() {
                document.getElementById("jobs-count").textContent = Object.keys(
                    state.jobs,
                ).length;
            }

            function updateJobsPanel() {
                updateJobsCount();
                const list = document.getElementById("jobs-list");
                const entries = Object.entries(state.jobs);
                if (!entries.length) {
                    document
                        .getElementById("jobs-btn")
                        .classList.remove("visible");
                    document
                        .getElementById("jobs-panel")
                        .classList.remove("visible");
                    return;
                }
                list.innerHTML = entries
                    .map(
                        ([id, j]) => `
                    <div class="job-item">
                        <div class="job-title">${escHtml(j.title || j.md5)}</div>
                        <div class="job-status">${j.status || "Queued"}</div>
                        ${j.progress ? `<div class="progress-bar"><div class="progress-fill" style="width:${j.progress}%"></div></div>` : ""}
                    </div>`,
                    )
                    .join("");
            }

            document
                .getElementById("jobs-btn")
                .addEventListener("click", () => {
                    document
                        .getElementById("jobs-panel")
                        .classList.toggle("visible");
                });
            document
                .getElementById("close-jobs")
                .addEventListener("click", () => {
                    document
                        .getElementById("jobs-panel")
                        .classList.remove("visible");
                });

            function escHtml(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }
        </script>
    </body>
</html>
